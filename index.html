<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard VP</title>
  <link rel="icon" type="image/png" href="icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .iframe-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      transition: opacity 0.5s ease-in-out;
    }

    .hidden {
      opacity: 0;
    }

    /* Lingueta lateral */
    .tab-container {
      position: absolute;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      z-index: 10;
    }

    .tab {
      background: rgba(0, 120, 212, 0.3);
      color: white;
      padding: 12px 10px;
      border-radius: 8px 0 0 8px;
      cursor: pointer;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transition: all 0.3s ease;
      transform: translateX(70%);
    }

    .tab:hover {
      transform: translateX(0);
      background: rgba(0, 120, 212, 0.9);
    }
  </style>
</head>
<body>

  <div class="iframe-container">

    <div class="tab-container">
      <div class="tab" id="toggleRefresh">
        Pausar
      </div>
    </div>

    <iframe 
      id="dashFrame"
      title="Dashboard - VP"
      src="https://app.powerbi.com/view?r=eyJrIjoiZDc5MjNlODgtNTA5Yi00Yjk4LWE3YmMtYjMyZGI2YmU4ZjVmIiwidCI6ImM3NGViY2JkLWE4MGYtNDYwYy1hMDUzLTEwZDViNmY1ZWQwNSJ9">
    </iframe>

  </div>

  <script>
    const iframe = document.getElementById("dashFrame");
    const tab = document.getElementById("toggleRefresh");

    const refreshInterval = 10 * 60 * 1000; // 10 minutos
    let intervalId;

    // Recupera estado salvo
    let isPaused = localStorage.getItem("paused") === "true";

    function refreshNow() {
      iframe.classList.add("hidden");
      setTimeout(() => {
        iframe.src = iframe.src;
        iframe.classList.remove("hidden");
      }, 500);
    }

    function startRefresh() {
      intervalId = setInterval(() => {
        if (!isPaused) {
          refreshNow();
        }
      }, refreshInterval);
    }

    function updateUI() {
      tab.textContent = isPaused ? "Retomar" : "Pausar";
    }

    tab.addEventListener("click", () => {
      isPaused = !isPaused;
      localStorage.setItem("paused", isPaused);

      if (!isPaused) {
        refreshNow(); // 🔥 atualiza imediatamente ao retomar
      }

      updateUI();
    });

    updateUI();
    startRefresh();
  </script>

</body>
</html>
